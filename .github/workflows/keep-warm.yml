name: keep-warm

# Pings the receipt backend's health check so the Vercel function stays warm
# and the first real scan doesn't cold-start.
#
# The repo is public, so GitHub Actions minutes are free/unlimited — the
# every-5-min schedule below keeps the Vercel function warm at no cost.
# Manual runs are also available via "Run workflow" (workflow_dispatch).

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping analyze-receipt health check
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" https://split-serverless.vercel.app/api/analyze-receipt)
          echo "Health ping -> HTTP $code"
          test "$code" = "200"
